openapi: 3.1.0
info:
  title: OpenFeature Local Provider HTTP API Boundary
  version: 0.0.0
  description: >
    This repository does not own a hosted HTTP API in the MVP. Public behavior is
    documented in docs/product/02-spec.md, docs/library/public-api.md, and
    docs/sdk/public-api.md. Keep this file empty of service endpoints unless a
    future ADR explicitly adds a remote control plane.
servers:
  - url: https://api.example.invalid
    description: Non-operational boundary marker; no hosted service is provided.
components:
  schemas:
    LocalProviderEvaluation:
      type: object
      required: [flagKey, value, reason, source]
      properties:
        flagKey:
          type: string
        value: {}
        reason:
          type: string
        source:
          type: string
          enum: [file, env, default, error]
        variant:
          type: string
        auditEventId:
          type: string
    LocalProviderError:
      type: object
      required: [flagKey, code, message, reason]
      properties:
        flagKey:
          type: string
        code:
          type: string
        message:
          type: string
        reason:
          type: string
paths: {}
