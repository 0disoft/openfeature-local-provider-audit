name: registry consumer

on:
  schedule:
    - cron: "41 4 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: registry-consumer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consume:
    name: consume npm ${{ matrix.channel }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-15
        channel:
          - latest
          - next

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install harness dependencies
        run: pnpm install --frozen-lockfile

      - name: Consume published package
        run: pnpm run registry-smoke --registry-version "${{ matrix.channel }}"
