name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package release candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./packages/local-provider/package.json').version")"
          expected_tag="v${package_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
            exit 1
          fi

      - name: Check
        run: pnpm run check

      - name: Release readiness
        run: pnpm run release-readiness

      - name: Smoke example
        run: pnpm --filter openfeature-local-provider-node-basic-example start

      - name: Packed package smoke
        run: pnpm run packed-smoke

      - name: Pack release artifact
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/.tmp/release"
          pnpm --filter @0disoft/openfeature-local-provider pack --pack-destination "${GITHUB_WORKSPACE}/.tmp/release"

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openfeature-local-provider-${{ github.ref_name }}
          path: .tmp/release/*.tgz
          if-no-files-found: error

      - name: Check npm published version
        id: published
        run: |
          package_version="$(node -p "require('./packages/local-provider/package.json').version")"
          if npm view "@0disoft/openfeature-local-provider@${package_version}" version >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish package
        if: steps.published.outputs.exists != 'true'
        working-directory: packages/local-provider
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release ${GITHUB_REF_NAME} already exists."
            exit 0
          fi

          package_version="$(node -p "require('./packages/local-provider/package.json').version")"
          gh release create "${GITHUB_REF_NAME}" .tmp/release/*.tgz \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME} for @0disoft/openfeature-local-provider ${package_version}."
