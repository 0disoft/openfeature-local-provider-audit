name: audit queue benchmark

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Workload profile
        required: true
        default: quick
        type: choice
        options:
          - quick
          - decision
          - custom
      writes:
        description: Custom profile writes per scenario
        required: true
        default: "5000"
        type: string
      queue_size:
        description: Custom profile bounded queue capacity
        required: true
        default: "1000"
        type: string
      stall_ms:
        description: Custom profile advisory lock stall in milliseconds
        required: true
        default: "100"
        type: string

permissions:
  contents: read

concurrency:
  group: audit-queue-benchmark-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: plan ${{ inputs.profile }} profile
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      profile: ${{ steps.plan.outputs.profile }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x

      - name: Build benchmark plan
        id: plan
        run: >-
          node scripts/audit-queue-benchmark-plan.mjs
          --profile "${{ inputs.profile }}"
          --writes "${{ inputs.writes }}"
          --queue-size "${{ inputs.queue_size }}"
          --stall-ms "${{ inputs.stall_ms }}"
          --github-output

  benchmark:
    name: ${{ matrix.sample }} r${{ matrix.repetition }} on ${{ matrix.os }}
    needs: plan
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 9
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Run benchmark
        run: >-
          node --expose-gc scripts/audit-queue-benchmark.mjs
          --profile "${{ needs.plan.outputs.profile }}"
          --sample "${{ matrix.sample }}"
          --repetition "${{ matrix.repetition }}"
          --writes "${{ matrix.writes }}"
          --queue-size "${{ matrix.queueSize }}"
          --stall-ms "${{ matrix.stallMs }}"
          --output ".tmp/audit-queue/result.json"

      - name: Upload benchmark result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-queue-${{ matrix.sample }}-r${{ matrix.repetition }}-${{ matrix.platform }}
          path: .tmp/audit-queue/result.json
          if-no-files-found: error

  summarize:
    name: validate and summarize results
    needs:
      - plan
      - benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x

      - name: Download benchmark results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: audit-queue-*
          path: .tmp/audit-queue-results
          merge-multiple: false

      - name: Validate and summarize benchmark results
        run: >-
          node scripts/audit-queue-benchmark-summary.mjs
          --input ".tmp/audit-queue-results"
          --output ".tmp/audit-queue-summary/summary.json"
          --markdown ".tmp/audit-queue-summary/summary.md"
          --github-summary

      - name: Upload benchmark summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audit-queue-summary
          path: .tmp/audit-queue-summary
          if-no-files-found: error
